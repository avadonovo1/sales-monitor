<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOREEPOP 銷售監控</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f0f0; }
        h1 { color: #e74c3c; }
        pre { background: white; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>📊 KOREEPOP 銷售監控系統</h1>
    <pre id="debug">載入中...</pre>

    <script>
        async function test() {
            const debug = document.getElementById('debug');
            try {
                debug.textContent = "正在連接後端...";
                const res = await fetch('/products');
                const products = await res.json();
                debug.textContent = JSON.stringify(products, null, 2);
            } catch(e) {
                debug.textContent = "錯誤: " + e.message;
            }
        }

        setInterval(test, 5000);
        window.onload = test;
    </script>
</body>
</html>
