<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOREEPOP 銷售監控</title>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 10px; }
        .container { max-width: 100%; margin: 0 auto; }
        h1 { text-align: center; color: #e74c3c; }
        .card { background: white; padding: 15px; margin: 12px 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .total { font-size: 2.6em; font-weight: bold; text-align: center; color: #2ecc71; margin: 10px 0; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 8px; margin: 8px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 KOREEPOP 銷售監控</h1>
        <div id="products"></div>
    </div>

    <script>
        const BASE = window.location.origin;

        async function loadProducts() {
            const container = document.getElementById('products');
            container.innerHTML = '';

            try {
                const res = await fetch(BASE + '/products');
                const products = await res.json();

                products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h2>${p.name}</h2>
                        <div class="total" id="total-${p.id}">載入中...</div>
                        <button onclick="fetchProduct(${p.id})">更新數據</button>
                        <table id="table-${p.id}">
                            <thead><tr><th>時間</th><th>總數</th><th>變化</th></tr></thead>
                            <tbody></tbody>
                        </table>
                    `;
                    container.appendChild(card);
                    fetchHistory(p.id);
                });
            } catch(e) {
                container.innerHTML = '<p>載入失敗</p>';
            }
        }

        async function fetchProduct(id) {
            await fetch(BASE + `/fetch/${id}`);
            loadProducts();
        }

        async function fetchHistory(id) {
            try {
                const res = await fetch(BASE + `/history/${id}`);
                const data = await res.json();
                const tbody = document.querySelector(`#table-${id} tbody`);
                tbody.innerHTML = data.map(h => `
                    <tr>
                        <td>${new Date(h.timestamp).toLocaleString('zh-TW')}</td>
                        <td>${h.total_sold}</td>
                        <td style="color:${h.delta>0?'green':'red'}">${h.delta>0?'+':''}${h.delta}</td>
                    </tr>
                `).join('');
            } catch(e) {}
        }

        setInterval(loadProducts, 8000);
        window.onload = loadProducts;
    </script>
</body>
</html>
